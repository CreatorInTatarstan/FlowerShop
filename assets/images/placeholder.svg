<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce8ef"/>
      <stop offset="100%" stop-color="#f7d6e2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g transform="translate(200, 200)">
    <!-- Стебель -->
    <rect x="-3" y="20" width="6" height="100" fill="#6b8e6e" rx="3"/>
    <!-- Листья -->
    <ellipse cx="-25" cy="60" rx="20" ry="10" fill="#6b8e6e" transform="rotate(-30 -25 60)"/>
    <ellipse cx="25" cy="80" rx="20" ry="10" fill="#6b8e6e" transform="rotate(30 25 80)"/>
    <!-- Цветок -->
    <g>
      <ellipse cx="0" cy="-40" rx="22" ry="30" fill="#d8527c"/>
      <ellipse cx="-30" cy="-15" rx="22" ry="30" fill="#e26891" transform="rotate(-60 -30 -15)"/>
      <ellipse cx="30" cy="-15" rx="22" ry="30" fill="#e26891" transform="rotate(60 30 -15)"/>
      <ellipse cx="-22" cy="20" rx="22" ry="30" fill="#d8527c" transform="rotate(-120 -22 20)"/>
      <ellipse cx="22" cy="20" rx="22" ry="30" fill="#d8527c" transform="rotate(120 22 20)"/>
      <circle cx="0" cy="0" r="18" fill="#f4a8c4"/>
      <circle cx="0" cy="0" r="10" fill="#fff5e6"/>
    </g>
  </g>
  <text x="200" y="370" font-family="Segoe UI, sans-serif" font-size="14" fill="#b03d63" text-anchor="middle" opacity="0.6">Цветочная лавка</text>
</svg>
